# /etc/nginx/sites-available/dirty-book-club
# Symlink: sudo ln -s /etc/nginx/sites-available/dirty-book-club /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name yourclub.duckdns.org;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourclub.duckdns.org;

    # ── SSL (Let's Encrypt via Certbot) ───────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourclub.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourclub.duckdns.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "strict-origin"  always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # ── Static frontend (built React app) ────────────────────────────────────
    root /home/ubuntu/dirty-book-club/backend/public;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy → Node.js on port 3001 ─────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 6M;
    }

    # ── Auth routes ───────────────────────────────────────────────────────────
    location /auth/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Uploaded files (covers) ───────────────────────────────────────────────
    location /uploads/ {
        proxy_pass       http://127.0.0.1:3001;
        proxy_set_header Host $host;
        expires          30d;
        add_header       Cache-Control "public, immutable";
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:3001;
    }
}
