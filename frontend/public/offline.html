<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Dirty Book Club</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; }
    body {
      background: #0d0a14;
      color: #e8daf8;
      font-family: 'Georgia', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      gap: 16px;
    }
    .logo { font-size: 48px; margin-bottom: 8px; }
    h1 {
      font-size: 28px;
      font-weight: 900;
      font-style: italic;
      color: #b08af0;
      letter-spacing: -0.5px;
    }
    p {
      font-size: 16px;
      color: #7060a0;
      line-height: 1.6;
      max-width: 300px;
    }
    button {
      margin-top: 8px;
      background: transparent;
      border: 1px solid #2e2448;
      border-radius: 6px;
      color: #7060a0;
      font-family: monospace;
      font-size: 13px;
      padding: 10px 24px;
      cursor: pointer;
    }
    button:hover { border-color: #b08af0; color: #b08af0; }
  </style>
</head>
<body>
  <div class="logo">📚</div>
  <h1>You're offline</h1>
  <p>Looks like you've lost your connection. The shelf will be waiting when you're back online.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
